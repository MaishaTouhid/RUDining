<svg viewBox="0 0 1200 900" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="1200" height="900" fill="#F8FAFC" rx="12"/>
  
  <!-- Title -->
  <rect x="0" y="0" width="1200" height="48" fill="#1E40AF" rx="12"/>
  <rect x="0" y="36" width="1200" height="12" fill="#1E40AF"/>
  <text x="600" y="31" text-anchor="middle" fill="white" font-size="18" font-weight="bold">HallMenu RU — Entity Relationship Diagram</text>

  <!-- ══ TABLE: halls ══ -->
  <g transform="translate(30, 70)">
    <rect width="180" height="110" fill="white" rx="8" stroke="#3B82F6" stroke-width="2"/>
    <rect width="180" height="32" fill="#3B82F6" rx="8"/>
    <rect y="24" width="180" height="8" fill="#3B82F6"/>
    <text x="90" y="22" text-anchor="middle" fill="white" font-size="13" font-weight="bold">halls</text>
    <line x1="0" y1="32" x2="180" y2="32" stroke="#3B82F6" stroke-width="1"/>
    <text x="12" y="50" fill="#1E293B" font-size="11">🔑 id: varchar</text>
    <text x="12" y="67" fill="#475569" font-size="11">  name: varchar</text>
    <text x="12" y="84" fill="#475569" font-size="11">  type: varchar</text>
    <text x="12" y="101" fill="#64748B" font-size="10" font-style="italic">  (boys / girls)</text>
  </g>

  <!-- ══ TABLE: moderators ══ -->
  <g transform="translate(30, 220)">
    <rect width="180" height="140" fill="white" rx="8" stroke="#8B5CF6" stroke-width="2"/>
    <rect width="180" height="32" fill="#8B5CF6" rx="8"/>
    <rect y="24" width="180" height="8" fill="#8B5CF6"/>
    <text x="90" y="22" text-anchor="middle" fill="white" font-size="13" font-weight="bold">moderators</text>
    <line x1="0" y1="32" x2="180" y2="32" stroke="#8B5CF6" stroke-width="1"/>
    <text x="12" y="50" fill="#1E293B" font-size="11">🔑 uid: varchar</text>
    <text x="12" y="67" fill="#475569" font-size="11">  name: varchar</text>
    <text x="12" y="84" fill="#475569" font-size="11">  role: varchar</text>
    <text x="12" y="101" fill="#475569" font-size="11">  hallId: varchar</text>
    <text x="12" y="118" fill="#475569" font-size="11">  hallName: varchar</text>
    <text x="12" y="132" fill="#64748B" font-size="10" font-style="italic">  FK → halls.id</text>
  </g>

  <!-- ══ TABLE: menus ══ -->
  <g transform="translate(280, 70)">
    <rect width="200" height="195" fill="white" rx="8" stroke="#0EA5E9" stroke-width="2"/>
    <rect width="200" height="32" fill="#0EA5E9" rx="8"/>
    <rect y="24" width="200" height="8" fill="#0EA5E9"/>
    <text x="100" y="22" text-anchor="middle" fill="white" font-size="13" font-weight="bold">menus</text>
    <line x1="0" y1="32" x2="200" y2="32" stroke="#0EA5E9" stroke-width="1"/>
    <text x="12" y="50" fill="#1E293B" font-size="11">🔑 id: varchar</text>
    <text x="12" y="67" fill="#475569" font-size="11">  hallId: varchar (FK)</text>
    <text x="12" y="84" fill="#475569" font-size="11">  date: varchar</text>
    <text x="12" y="101" fill="#475569" font-size="11">  diningUpdatedBy: varchar</text>
    <text x="12" y="118" fill="#475569" font-size="11">  diningUpdatedAt: timestamp</text>
    <text x="12" y="135" fill="#475569" font-size="11">  canteenUpdatedBy: varchar</text>
    <text x="12" y="152" fill="#475569" font-size="11">  canteenUpdatedAt: timestamp</text>
    <text x="12" y="169" fill="#475569" font-size="11">  createdAt: timestamp</text>
    <text x="12" y="186" fill="#475569" font-size="11">  updatedAt: timestamp</text>
  </g>

  <!-- ══ TABLE: dining_meals ══ -->
  <g transform="translate(555, 70)">
    <rect width="185" height="145" fill="white" rx="8" stroke="#F59E0B" stroke-width="2"/>
    <rect width="185" height="32" fill="#F59E0B" rx="8"/>
    <rect y="24" width="185" height="8" fill="#F59E0B"/>
    <text x="92" y="22" text-anchor="middle" fill="white" font-size="13" font-weight="bold">dining_meals</text>
    <line x1="0" y1="32" x2="185" y2="32" stroke="#F59E0B" stroke-width="1"/>
    <text x="12" y="50" fill="#1E293B" font-size="11">🔑 id: varchar</text>
    <text x="12" y="67" fill="#475569" font-size="11">  menuId: varchar (FK)</text>
    <text x="12" y="84" fill="#475569" font-size="11">  mealType: varchar</text>
    <text x="12" y="101" fill="#64748B" font-size="10" font-style="italic">  (breakfast/lunch/dinner)</text>
    <text x="12" y="118" fill="#475569" font-size="11">  time: varchar</text>
    <text x="12" y="135" fill="#475569" font-size="11">  note: text</text>
  </g>

  <!-- ══ TABLE: meal_items ══ -->
  <g transform="translate(810, 70)">
    <rect width="180" height="160" fill="white" rx="8" stroke="#10B981" stroke-width="2"/>
    <rect width="180" height="32" fill="#10B981" rx="8"/>
    <rect y="24" width="180" height="8" fill="#10B981"/>
    <text x="90" y="22" text-anchor="middle" fill="white" font-size="13" font-weight="bold">meal_items</text>
    <line x1="0" y1="32" x2="180" y2="32" stroke="#10B981" stroke-width="1"/>
    <text x="12" y="50" fill="#1E293B" font-size="11">🔑 id: varchar</text>
    <text x="12" y="67" fill="#475569" font-size="11">  mealId: varchar (FK)</text>
    <text x="12" y="84" fill="#475569" font-size="11">  name: varchar</text>
    <text x="12" y="101" fill="#475569" font-size="11">  price: int</text>
    <text x="12" y="118" fill="#475569" font-size="11">  count: int</text>
    <text x="12" y="135" fill="#475569" font-size="11">  status: varchar</text>
    <text x="12" y="152" fill="#64748B" font-size="10" font-style="italic">  (available/limited/finished)</text>
  </g>

  <!-- ══ TABLE: canteen_items ══ -->
  <g transform="translate(810, 265)">
    <rect width="180" height="160" fill="white" rx="8" stroke="#EC4899" stroke-width="2"/>
    <rect width="180" height="32" fill="#EC4899" rx="8"/>
    <rect y="24" width="180" height="8" fill="#EC4899"/>
    <text x="90" y="22" text-anchor="middle" fill="white" font-size="13" font-weight="bold">canteen_items</text>
    <line x1="0" y1="32" x2="180" y2="32" stroke="#EC4899" stroke-width="1"/>
    <text x="12" y="50" fill="#1E293B" font-size="11">🔑 id: varchar</text>
    <text x="12" y="67" fill="#475569" font-size="11">  menuId: varchar (FK)</text>
    <text x="12" y="84" fill="#475569" font-size="11">  name: varchar</text>
    <text x="12" y="101" fill="#475569" font-size="11">  price: int</text>
    <text x="12" y="118" fill="#475569" font-size="11">  count: int</text>
    <text x="12" y="135" fill="#475569" font-size="11">  status: varchar</text>
    <text x="12" y="152" fill="#64748B" font-size="10" font-style="italic">  (available/limited/finished)</text>
  </g>

  <!-- ══ TABLE: notices ══ -->
  <g transform="translate(280, 310)">
    <rect width="200" height="210" fill="white" rx="8" stroke="#F97316" stroke-width="2"/>
    <rect width="200" height="32" fill="#F97316" rx="8"/>
    <rect y="24" width="200" height="8" fill="#F97316"/>
    <text x="100" y="22" text-anchor="middle" fill="white" font-size="13" font-weight="bold">notices</text>
    <line x1="0" y1="32" x2="200" y2="32" stroke="#F97316" stroke-width="1"/>
    <text x="12" y="50" fill="#1E293B" font-size="11">🔑 id: varchar</text>
    <text x="12" y="67" fill="#475569" font-size="11">  hallId: varchar (FK)</text>
    <text x="12" y="84" fill="#475569" font-size="11">  hallName: varchar</text>
    <text x="12" y="101" fill="#475569" font-size="11">  role: varchar</text>
    <text x="12" y="118" fill="#475569" font-size="11">  noticeType: varchar</text>
    <text x="12" y="135" fill="#475569" font-size="11">  title: varchar</text>
    <text x="12" y="152" fill="#475569" font-size="11">  message: text</text>
    <text x="12" y="169" fill="#475569" font-size="11">  expiresIn: int</text>
    <text x="12" y="186" fill="#475569" font-size="11">  moderatorName: varchar</text>
    <text x="12" y="203" fill="#475569" font-size="11">  createdAt: timestamp</text>
  </g>

  <!-- ══ TABLE: feasts ══ -->
  <g transform="translate(555, 265)">
    <rect width="200" height="225" fill="white" rx="8" stroke="#6366F1" stroke-width="2"/>
    <rect width="200" height="32" fill="#6366F1" rx="8"/>
    <rect y="24" width="200" height="8" fill="#6366F1"/>
    <text x="100" y="22" text-anchor="middle" fill="white" font-size="13" font-weight="bold">feasts</text>
    <line x1="0" y1="32" x2="200" y2="32" stroke="#6366F1" stroke-width="1"/>
    <text x="12" y="50" fill="#1E293B" font-size="11">🔑 id: varchar</text>
    <text x="12" y="67" fill="#475569" font-size="11">  hallId: varchar (FK)</text>
    <text x="12" y="84" fill="#475569" font-size="11">  hallName: varchar</text>
    <text x="12" y="101" fill="#475569" font-size="11">  role: varchar</text>
    <text x="12" y="118" fill="#475569" font-size="11">  date: varchar</text>
    <text x="12" y="135" fill="#475569" font-size="11">  title: varchar</text>
    <text x="12" y="152" fill="#475569" font-size="11">  timeRange: varchar</text>
    <text x="12" y="169" fill="#475569" font-size="11">  menu: text</text>
    <text x="12" y="186" fill="#475569" font-size="11">  price: int</text>
    <text x="12" y="203" fill="#475569" font-size="11">  moderatorName: varchar</text>
    <text x="12" y="220" fill="#475569" font-size="11">  createdAt / updatedAt</text>
  </g>

  <!-- ══ TABLE: foodReviews ══ -->
  <g transform="translate(30, 540)">
    <rect width="200" height="195" fill="white" rx="8" stroke="#14B8A6" stroke-width="2"/>
    <rect width="200" height="32" fill="#14B8A6" rx="8"/>
    <rect y="24" width="200" height="8" fill="#14B8A6"/>
    <text x="100" y="22" text-anchor="middle" fill="white" font-size="13" font-weight="bold">foodReviews</text>
    <line x1="0" y1="32" x2="200" y2="32" stroke="#14B8A6" stroke-width="1"/>
    <text x="12" y="50" fill="#1E293B" font-size="11">🔑 id: varchar</text>
    <text x="12" y="67" fill="#475569" font-size="11">  hallId: varchar (FK)</text>
    <text x="12" y="84" fill="#475569" font-size="11">  hallName: varchar</text>
    <text x="12" y="101" fill="#475569" font-size="11">  itemName: varchar</text>
    <text x="12" y="118" fill="#475569" font-size="11">  mealType: varchar</text>
    <text x="12" y="135" fill="#475569" font-size="11">  rating: int</text>
    <text x="12" y="152" fill="#475569" font-size="11">  comment: text</text>
    <text x="12" y="169" fill="#475569" font-size="11">  reviewerName: varchar</text>
    <text x="12" y="186" fill="#475569" font-size="11">  createdAt: timestamp</text>
  </g>

  <!-- ══ TABLE: updateHistory ══ -->
  <g transform="translate(280, 570)">
    <rect width="200" height="160" fill="white" rx="8" stroke="#EF4444" stroke-width="2"/>
    <rect width="200" height="32" fill="#EF4444" rx="8"/>
    <rect y="24" width="200" height="8" fill="#EF4444"/>
    <text x="100" y="22" text-anchor="middle" fill="white" font-size="13" font-weight="bold">updateHistory</text>
    <line x1="0" y1="32" x2="200" y2="32" stroke="#EF4444" stroke-width="1"/>
    <text x="12" y="50" fill="#1E293B" font-size="11">🔑 id: varchar</text>
    <text x="12" y="67" fill="#475569" font-size="11">  hallId: varchar (FK)</text>
    <text x="12" y="84" fill="#475569" font-size="11">  moderatorName: varchar</text>
    <text x="12" y="101" fill="#475569" font-size="11">  role: varchar</text>
    <text x="12" y="118" fill="#475569" font-size="11">  action: varchar</text>
    <text x="12" y="135" fill="#475569" font-size="11">  timestamp: timestamp</text>
    <text x="12" y="152" fill="#64748B" font-size="10" font-style="italic">  FK → halls.id</text>
  </g>

  <!-- ════ RELATIONSHIP LINES ════ -->

  <!-- halls → menus (1 to *) -->
  <line x1="210" y1="120" x2="280" y2="140" stroke="#0EA5E9" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="230" y="118" fill="#0EA5E9" font-size="10" font-weight="bold">1</text>
  <text x="265" y="135" fill="#0EA5E9" font-size="10" font-weight="bold">*</text>

  <!-- halls → moderators (1 to *) -->
  <line x1="120" y1="180" x2="120" y2="220" stroke="#8B5CF6" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="126" y="200" fill="#8B5CF6" font-size="10" font-weight="bold">1..*</text>

  <!-- halls → notices (1 to *) -->
  <line x1="210" y1="100" x2="280" y2="390" stroke="#F97316" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="238" y="250" fill="#F97316" font-size="10" font-weight="bold">1..*</text>

  <!-- halls → feasts -->
  <line x1="210" y1="110" x2="555" y2="330" stroke="#6366F1" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="370" y="200" fill="#6366F1" font-size="10" font-weight="bold">1..*</text>

  <!-- menus → dining_meals (1 to *) -->
  <line x1="480" y1="130" x2="555" y2="130" stroke="#F59E0B" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="495" y="122" fill="#F59E0B" font-size="10" font-weight="bold">1</text>
  <text x="544" y="122" fill="#F59E0B" font-size="10" font-weight="bold">*</text>

  <!-- menus → canteen_items (1 to *) -->
  <line x1="480" y1="200" x2="810" y2="330" stroke="#EC4899" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="630" y="245" fill="#EC4899" font-size="10" font-weight="bold">1..*</text>

  <!-- dining_meals → meal_items (1 to *) -->
  <line x1="740" y1="130" x2="810" y2="130" stroke="#10B981" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="755" y="122" fill="#10B981" font-size="10" font-weight="bold">1</text>
  <text x="800" y="122" fill="#10B981" font-size="10" font-weight="bold">*</text>

  <!-- halls → foodReviews -->
  <line x1="120" y1="180" x2="120" y2="540" stroke="#14B8A6" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="126" y="370" fill="#14B8A6" font-size="10" font-weight="bold">1..*</text>

  <!-- halls → updateHistory -->
  <line x1="210" y1="155" x2="280" y2="620" stroke="#EF4444" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="228" y="430" fill="#EF4444" font-size="10" font-weight="bold">1..*</text>

  <!-- Legend -->
  <rect x="555" y="545" width="620" height="90" fill="white" rx="8" stroke="#CBD5E1" stroke-width="1.5"/>
  <text x="575" y="570" fill="#1E293B" font-size="12" font-weight="bold">Legend</text>
  <line x1="575" y1="580" x2="620" y2="580" stroke="#475569" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="628" y="584" fill="#475569" font-size="11">Foreign Key relationship</text>
  <rect x="575" y="592" width="12" height="12" fill="#3B82F6" rx="2"/>
  <text x="595" y="603" fill="#475569" font-size="11">🔑 = Primary Key (PK)</text>
  <text x="575" y="622" fill="#64748B" font-size="11">All tables stored in Google Cloud Firestore (NoSQL)</text>
  <text x="575" y="638" fill="#64748B" font-size="11">Relational references maintained via hallId / menuId / mealId fields</text>
</svg>
