<svg viewBox="0 0 1100 620" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="1100" height="620" fill="#F8FAFC" rx="12"/>
  <rect x="0" y="0" width="1100" height="48" fill="#1E40AF" rx="12"/>
  <rect x="0" y="36" width="1100" height="12" fill="#1E40AF"/>
  <text x="550" y="31" text-anchor="middle" fill="white" font-size="18" font-weight="bold">HallMenu RU — Screen Navigation Map</text>

  <!-- Row 1: Entry screens -->
  <rect x="460" y="60" width="140" height="50" fill="#1D4ED8" rx="8"/>
  <text x="530" y="80" text-anchor="middle" fill="white" font-size="11" font-weight="bold">index.js</text>
  <text x="530" y="98" text-anchor="middle" fill="#BFDBFE" font-size="10">SplashScreen</text>

  <!-- Splash → Onboarding -->
  <line x1="460" y1="85" x2="310" y2="85" stroke="#64748B" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#dg)"/>
  <text x="385" y="78" text-anchor="middle" fill="#64748B" font-size="9">first visit</text>
  <rect x="220" y="60" width="90" height="50" fill="#6366F1" rx="8"/>
  <text x="265" y="84" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Onboarding</text>

  <!-- Splash → Home (returning) -->
  <line x1="600" y1="85" x2="740" y2="85" stroke="#64748B" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#dg)"/>
  <text x="670" y="78" text-anchor="middle" fill="#64748B" font-size="9">returning</text>

  <!-- Home -->
  <rect x="720" y="60" width="90" height="50" fill="#1D4ED8" rx="8"/>
  <text x="765" y="88" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Home</text>
  <line x1="265" y1="110" x2="265" y2="135" stroke="#6366F1" stroke-width="1.5" marker-end="url(#dp)"/>
  <line x1="265" y1="135" x2="765" y2="135" stroke="#6366F1" stroke-width="1.5" marker-end="url(#dg)"/>
  <line x1="765" y1="110" x2="765" y2="135" stroke="#1D4ED8" stroke-width="1.5"/>

  <!-- Home → HallList and ModeratorRole -->
  <line x1="765" y1="135" x2="300" y2="190" stroke="#10B981" stroke-width="1.5" marker-end="url(#dg)"/>
  <text x="450" y="155" fill="#10B981" font-size="9" font-weight="bold">Student role</text>
  <line x1="765" y1="135" x2="870" y2="190" stroke="#8B5CF6" stroke-width="1.5" marker-end="url(#dm)"/>
  <text x="840" y="155" fill="#8B5CF6" font-size="9" font-weight="bold">Mod role</text>

  <!-- ═══ STUDENT SIDE ═══ -->
  <rect x="210" y="190" width="120" height="46" fill="#059669" rx="8"/>
  <text x="270" y="210" text-anchor="middle" fill="white" font-size="11" font-weight="bold">HallList</text>
  <text x="270" y="227" text-anchor="middle" fill="#A7F3D0" font-size="9">17 halls, search</text>

  <!-- HallList → HallDetail -->
  <line x1="270" y1="236" x2="270" y2="270" stroke="#10B981" stroke-width="1.5" marker-end="url(#dg)"/>
  <rect x="200" y="270" width="140" height="46" fill="#10B981" rx="8"/>
  <text x="270" y="290" text-anchor="middle" fill="white" font-size="11" font-weight="bold">HallDetail</text>
  <text x="270" y="308" text-anchor="middle" fill="#D1FAE5" font-size="9">Dining + Canteen tabs</text>

  <!-- HallList → Feast / Notices -->
  <line x1="330" y1="213" x2="430" y2="213" stroke="#10B981" stroke-width="1.5" marker-end="url(#dg)"/>
  <rect x="430" y="190" width="90" height="46" fill="#F59E0B" rx="8"/>
  <text x="475" y="217" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Feast</text>

  <line x1="330" y1="224" x2="430" y2="260" stroke="#10B981" stroke-width="1.5" marker-end="url(#dg)"/>
  <rect x="430" y="248" width="90" height="46" fill="#F97316" rx="8"/>
  <text x="475" y="276" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Notices</text>

  <!-- ═══ MODERATOR SIDE ═══ -->
  <rect x="810" y="190" width="140" height="46" fill="#7C3AED" rx="8"/>
  <text x="880" y="210" text-anchor="middle" fill="white" font-size="11" font-weight="bold">ModeratorRole</text>
  <text x="880" y="227" text-anchor="middle" fill="#DDD6FE" font-size="9">Dining / Canteen</text>

  <line x1="880" y1="236" x2="880" y2="270" stroke="#8B5CF6" stroke-width="1.5" marker-end="url(#dm)"/>
  <rect x="810" y="270" width="140" height="46" fill="#6D28D9" rx="8"/>
  <text x="880" y="290" text-anchor="middle" fill="white" font-size="11" font-weight="bold">ModeratorLogin</text>
  <text x="880" y="308" text-anchor="middle" fill="#DDD6FE" font-size="9">Firebase Auth</text>

  <line x1="880" y1="316" x2="880" y2="350" stroke="#8B5CF6" stroke-width="1.5" marker-end="url(#dm)"/>
  <rect x="800" y="350" width="160" height="46" fill="#5B21B6" rx="8"/>
  <text x="880" y="370" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Moderator Dashboard</text>

  <!-- Dashboard → 6 screens -->
  <line x1="800" y1="373" x2="580" y2="430" stroke="#8B5CF6" stroke-width="1.5" marker-end="url(#dm)"/>
  <line x1="800" y1="373" x2="660" y2="430" stroke="#8B5CF6" stroke-width="1.5" marker-end="url(#dm)"/>
  <line x1="800" y1="373" x2="740" y2="430" stroke="#8B5CF6" stroke-width="1.5" marker-end="url(#dm)"/>
  <line x1="960" y1="373" x2="820" y2="430" stroke="#8B5CF6" stroke-width="1.5" marker-end="url(#dm)"/>
  <line x1="960" y1="373" x2="900" y2="430" stroke="#8B5CF6" stroke-width="1.5" marker-end="url(#dm)"/>
  <line x1="960" y1="373" x2="990" y2="430" stroke="#8B5CF6" stroke-width="1.5" marker-end="url(#dm)"/>

  <!-- 6 mod screens -->
  <rect x="538" y="430" width="86" height="42" fill="#8B5CF6" rx="6"/>
  <text x="581" y="449" text-anchor="middle" fill="white" font-size="9" font-weight="bold">QuickStatus</text>
  <text x="581" y="465" text-anchor="middle" fill="#DDD6FE" font-size="8">(Dining)</text>

  <rect x="634" y="430" width="86" height="42" fill="#8B5CF6" rx="6"/>
  <text x="677" y="449" text-anchor="middle" fill="white" font-size="9" font-weight="bold">MenuEditor</text>
  <text x="677" y="465" text-anchor="middle" fill="#DDD6FE" font-size="8">(Dining)</text>

  <rect x="730" y="430" width="86" height="42" fill="#EC4899" rx="6"/>
  <text x="773" y="449" text-anchor="middle" fill="white" font-size="9" font-weight="bold">CanteenEditor</text>
  <text x="773" y="465" text-anchor="middle" fill="#FBCFE8" font-size="8">(Canteen)</text>

  <rect x="826" y="430" width="86" height="42" fill="#EC4899" rx="6"/>
  <text x="869" y="449" text-anchor="middle" fill="white" font-size="9" font-weight="bold">CanteenQuick</text>
  <text x="869" y="465" text-anchor="middle" fill="#FBCFE8" font-size="8">Status</text>

  <rect x="922" y="430" width="86" height="42" fill="#F97316" rx="6"/>
  <text x="965" y="449" text-anchor="middle" fill="white" font-size="9" font-weight="bold">NoticeEditor</text>
  <text x="965" y="465" text-anchor="middle" fill="#FED7AA" font-size="8">FeastEditor</text>

  <rect x="1018" y="430" width="62" height="42" fill="#64748B" rx="6"/>
  <text x="1049" y="449" text-anchor="middle" fill="white" font-size="9" font-weight="bold">Daily</text>
  <text x="1049" y="465" text-anchor="middle" fill="#CBD5E1" font-size="8">Reset</text>

  <!-- All mod screens → Success -->
  <line x1="677" y1="472" x2="677" y2="530" stroke="#10B981" stroke-width="1.5" marker-end="url(#dg)"/>
  <line x1="773" y1="472" x2="773" y2="530" stroke="#10B981" stroke-width="1.5" marker-end="url(#dg)"/>
  <line x1="869" y1="472" x2="790" y2="530" stroke="#10B981" stroke-width="1.5" marker-end="url(#dg)"/>
  <line x1="965" y1="472" x2="790" y2="530" stroke="#10B981" stroke-width="1.5" marker-end="url(#dg)"/>
  <rect x="660" y="530" width="160" height="46" fill="#059669" rx="8"/>
  <text x="740" y="557" text-anchor="middle" fill="white" font-size="12" font-weight="bold">SuccessScreen</text>

  <!-- Verification (side) -->
  <rect x="1018" y="350" width="62" height="46" fill="#374151" rx="6"/>
  <text x="1049" y="370" text-anchor="middle" fill="white" font-size="9" font-weight="bold">Verifi-</text>
  <text x="1049" y="386" text-anchor="middle" fill="#D1D5DB" font-size="9">cation</text>
  <line x1="960" y1="373" x2="1049" y2="350" stroke="#8B5CF6" stroke-width="1.5" marker-end="url(#dm)"/>

  <!-- Defs -->
  <defs>
    <marker id="dg" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#10B981"/>
    </marker>
    <marker id="dm" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#8B5CF6"/>
    </marker>
    <marker id="dp" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6366F1"/>
    </marker>
  </defs>

  <!-- Legend -->
  <rect x="20" y="400" width="200" height="110" fill="white" rx="8" stroke="#CBD5E1" stroke-width="1.5"/>
  <text x="120" y="422" text-anchor="middle" fill="#1E293B" font-size="12" font-weight="bold">Legend</text>
  <rect x="35" y="432" width="14" height="14" fill="#059669" rx="3"/>
  <text x="56" y="444" fill="#475569" font-size="11">Student screens</text>
  <rect x="35" y="454" width="14" height="14" fill="#7C3AED" rx="3"/>
  <text x="56" y="466" fill="#475569" font-size="11">Moderator screens</text>
  <rect x="35" y="476" width="14" height="14" fill="#F59E0B" rx="3"/>
  <text x="56" y="488" fill="#475569" font-size="11">Shared screens</text>
  <line x1="35" y1="500" x2="50" y2="500" stroke="#64748B" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="56" y="504" fill="#475569" font-size="11">Conditional nav</text>
</svg>
